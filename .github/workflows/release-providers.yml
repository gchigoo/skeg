name: release-providers

on:
  push:
    tags:
      - 'skeg-provider-*-v*'

permissions:
  contents: write

jobs:
  release-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Parse tag and assert package version
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # skeg-provider-<name>-v<semver>
          if [[ ! "$TAG" =~ ^(skeg-provider-[a-z0-9-]+)-v(.+)$ ]]; then
            echo "Tag must match skeg-provider-<name>-v<version>: $TAG"
            exit 1
          fi
          NAME="${BASH_REMATCH[1]}"
          VER="${BASH_REMATCH[2]}"
          DIR="providers/${NAME}"
          test -d "$DIR"
          PKG="$(node -p "require('./${DIR}/package.json').version")"
          echo "tag=$TAG name=$NAME version=$VER package=$PKG"
          test "$VER" = "$PKG"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Conformance
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/provider-test.mjs \
            "${{ steps.meta.outputs.dir }}/index.mjs"

      - name: Pack and checksums
        working-directory: ${{ steps.meta.outputs.dir }}
        run: |
          set -euo pipefail
          npm pack
          TARBALL="$(ls ${{ steps.meta.outputs.name }}-*.tgz | head -n1)"
          test -n "$TARBALL"
          sha256sum "$TARBALL" > SHA256SUMS.txt
          ls -la "$TARBALL" SHA256SUMS.txt
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIR="${{ steps.meta.outputs.dir }}"
          NAME="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          TARBALL="${DIR}/${NAME}-${VER}.tgz"
          test -f "$TARBALL"
          NOTES="Independent Skeg provider ${NAME}@${VER}

          Conformance: \`skeg-provider-test\` passed.
          Artifacts: npm tarball + SHA-256 checksums.
          Install: \`npm i ${TARBALL}\` then \`/skeg trust ${NAME}\`."
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" "${DIR}/SHA256SUMS.txt" \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"
