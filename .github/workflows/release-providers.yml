name: release-providers

on:
  push:
    tags:
      - 'provider-*-v*'

permissions:
  contents: write

jobs:
  release-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Parse tag and assert package version
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # provider-<name>-v<semver>
          if [[ ! "$TAG" =~ ^provider-([a-z0-9-]+)-v(.+)$ ]]; then
            echo "Tag must match provider-<name>-v<version>: $TAG"
            exit 1
          fi
          NAME="${BASH_REMATCH[1]}"
          VER="${BASH_REMATCH[2]}"
          DIR="providers/${NAME}"
          test -d "$DIR"
          PKG_NAME="$(node -p "require('./${DIR}/package.json').name")"
          PKG_VER="$(node -p "require('./${DIR}/package.json').version")"
          echo "tag=$TAG name=$NAME version=$VER package=$PKG_NAME@$PKG_VER"
          test "$VER" = "$PKG_VER"
          test "$PKG_NAME" = "@veritack/${NAME}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Conformance + semantic cases
        run: |
          set -euo pipefail
          DIR="${{ steps.meta.outputs.dir }}"
          CASES="${DIR}/provider-cases.json"
          if [ -f "$CASES" ]; then
            node --experimental-strip-types scripts/provider-test.mjs \
              "${DIR}/index.mjs" --cases "$CASES"
          else
            node --experimental-strip-types scripts/provider-test.mjs \
              "${DIR}/index.mjs"
          fi

      - name: Pack and checksums
        working-directory: ${{ steps.meta.outputs.dir }}
        run: |
          set -euo pipefail
          npm pack
          TARBALL="$(ls *.tgz | head -n1)"
          test -n "$TARBALL"
          sha256sum "$TARBALL" > SHA256SUMS.txt
          ls -la "$TARBALL" SHA256SUMS.txt
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Clean-directory tarball smoke
        run: |
          set -euo pipefail
          DIR="${{ steps.meta.outputs.dir }}"
          TARBALL="$(ls "${DIR}"/*.tgz | head -n1)"
          SMOKE="$(mktemp -d)"
          cd "$SMOKE"
          npm init -y >/dev/null
          npm pkg set type=module >/dev/null
          npm install "$OLDPWD/$TARBALL"
          node --input-type=module -e "
            const name = process.env.PKG_NAME;
            const mod = await import(name);
            const p = mod.default ?? mod;
            if (p.apiVersion !== 1) throw new Error('apiVersion');
            if (!p.id) throw new Error('id');
            console.log('smoke ok', p.id, p.capabilities);
          "
        env:
          PKG_NAME: ${{ steps.meta.outputs.pkg_name }}

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIR="${{ steps.meta.outputs.dir }}"
          NAME="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          PKG_NAME="${{ steps.meta.outputs.pkg_name }}"
          TARBALL="$(ls "${DIR}"/*.tgz | head -n1)"
          BASE="$(basename "$TARBALL")"
          test -f "$TARBALL"
          NOTES="Independent Veritack provider ${PKG_NAME}@${VER}

          Conformance + semantic cases: \`veritack-provider-test\` passed.
          Artifacts: npm tarball + SHA-256 checksums.
          Install: \`npm i ./${BASE}\` then \`npm install @veritack/pi-veritack\` and \`/veritack trust ${PKG_NAME}\`."
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" "${DIR}/SHA256SUMS.txt" \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"
