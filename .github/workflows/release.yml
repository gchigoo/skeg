name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Assert tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG"

      - run: npm ci
      - run: npm run verify
      - run: npm run dogfood:dist
      # dogfood:dist 会清理临时 tarball；发布产物再 pack 一次
      - run: npm pack

      - name: Checksums and SBOM
        run: |
          set -euo pipefail
          TARBALL="$(ls gchigoo-skeg-*.tgz | head -n1)"
          test -n "$TARBALL"
          sha256sum "$TARBALL" > SHA256SUMS.txt
          npm sbom --sbom-format spdx > sbom.spdx.json
          test -s sbom.spdx.json
          ls -la "$TARBALL" SHA256SUMS.txt sbom.spdx.json

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARBALL="$(ls gchigoo-skeg-*.tgz | head -n1)"
          NOTES="Skeg ${GITHUB_REF_NAME}

          Artifacts: npm tarball, SHA-256 checksums, SPDX SBOM.
          Install: \`npm i -g ${TARBALL}\` or wait for npm publish."
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" SHA256SUMS.txt sbom.spdx.json \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"

      - name: npm publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret missing — skip npm publish"
            exit 0
          fi
          npm publish --provenance --access public
